services:
  - type: web
    name: bakershub-app
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .

    startCommand: >
      php artisan key:generate --force &&
      chmod -R 775 storage bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache &&
      apache2-foreground

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: true # 🔥 TEMP (see real error)

      - key: APP_KEY
        generateValue: true

      - key: APP_URL
        value: https://bakershub-full-stack-e-commerce-platform.onrender.com

      - key: LOG_CHANNEL
        value: errorlog

      # DB CONFIG
      - key: DB_CONNECTION
        value: mysql

      - key: DB_HOST
        fromDatabase:
          name: bakershub-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: bakershub-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: bakershub-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: bakershub-db
          property: username

      - key: DB_PASSWORD
        fromDatabase:
          name: bakershub-db
          property: password

      # 🔥 TEMP SAFE SETTINGS (avoid Redis crash)
      - key: CACHE_DRIVER
        value: file

      - key: SESSION_DRIVER
        value: file

      - key: QUEUE_CONNECTION
        value: sync

    disk:
      name: bakershub-storage
      mountPath: /var/www/html/storage
      sizeGB: 1

  # MySQL
  - type: pserv
    name: bakershub-db
    env: mysql
    plan: starter

    envVars:
      - key: MYSQL_DATABASE
        value: bakershub

      - key: MYSQL_USER
        value: bakershub_user

      - key: MYSQL_PASSWORD
        generateValue: true

      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

    disk:
      name: bakershub-db-disk
      mountPath: /var/lib/mysql
      sizeGB: 10
